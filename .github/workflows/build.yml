name: Build API + Angular

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          cache: false

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Run Angular lint
        working-directory: ./client
        run: npm run lint

      - name: Build Angular (production)
        working-directory: ./client
        run: npm run build -- --configuration production

      - name: Copy Angular build to API wwwroot
        run: |
          mkdir -p ./Api/BackendApp/wwwroot
          cp -r ./client/dist/frontend-app/browser/* ./Api/BackendApp/wwwroot/

      - name: Restore .NET dependencies
        working-directory: ./Api
        run: dotnet restore BackendApp.sln

      - name: Run .NET tests
        working-directory: ./Api
        run: dotnet test BackendApp.sln --configuration Release --no-restore --logger "trx;LogFileName=test_results.trx"

      - name: Build .NET solution
        working-directory: ./Api
        run: dotnet build BackendApp.sln --configuration Release --no-restore

      - name: Publish .NET project
        working-directory: ./Api/BackendApp
        run: dotnet publish -c Release -o ./bin/Release/net9.0/publish --no-build

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: backendapp-api
          path: ./Api/BackendApp/bin/Release/net9.0/publish

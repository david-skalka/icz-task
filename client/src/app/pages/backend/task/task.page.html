<div class="toolbar">
  <mat-form-field appearance="outline" subscriptSizing="dynamic">
    <mat-label>Name</mat-label>
    <input
      matInput
      [(ngModel)]="nameFilter"
      (keyup.enter)="loadData()"
      type="text"
      autocomplete="off"
    />
  </mat-form-field>
  <button mat-icon-button color="primary" type="button" (click)="loadData()" aria-label="Filtrovat">
    <mat-icon>search</mat-icon>
  </button>
  <button mat-icon-button color="primary" type="button" (click)="add()">
    <mat-icon>add</mat-icon>
  </button>
</div>

<div class="table-scroll mat-elevation-z8">
<table mat-table [dataSource]="items" class="tasks-table">

  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> ID </th>
    <td mat-cell *matCellDef="let element"> {{ element.id }} </td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Name </th>
    <td mat-cell *matCellDef="let element"> {{ element.name }} </td>
  </ng-container>

  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef> Description </th>
    <td mat-cell *matCellDef="let element"> {{ element.description }} </td>
  </ng-container>

  <ng-container matColumnDef="finished">
    <th mat-header-cell *matHeaderCellDef> Hotovo </th>
    <td mat-cell *matCellDef="let element"> {{ element.finished ? 'Ano' : 'Ne' }} </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Actions </th>
    <td mat-cell *matCellDef="let element">
      <button mat-button [matMenuTriggerFor]="menu">Actions</button>
      <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="edit(element)">Edit</button>
        <button mat-menu-item (click)="delete(element)">Delete</button>
      </mat-menu>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
</div>
